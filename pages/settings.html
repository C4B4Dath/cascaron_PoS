const DB = {
    _get(key, def) {
        try { return JSON.parse(localStorage.getItem('nexpos_' + key)) ?? def; }
        catch { return def; }
    },
    _set(key, val) { localStorage.setItem('nexpos_' + key, JSON.stringify(val)); },

    getSales() { return this._get('sales', []); },
    setSales(s) { this._set('sales', s); },
    addSale(sale) {
        const sales = this.getSales();
        sales.unshift(sale);
        this.setSales(sales);
        this._updateCashRegister(sale);
        this._updateInventory(sale);
        return sale;
    },
    _updateCashRegister(sale) {
        const movs = this._get('cash_movements', []);
        movs.unshift({
            id: Date.now(),
            time: sale.time,
            type: 'Ingreso',
            concept: 'Venta ' + sale.ticket,
            amount: sale.total,
            balance: 0
        });
        this._set('cash_movements', movs);
    },
    _updateInventory(sale) {
        const inv = this.getInventory();
        sale.items.forEach(item => {
            const prod = inv.find(p => p.sku === item.sku);
            if (prod) {
                prod.stock = Math.max(0, prod.stock - item.quantity);
            }
        });
        this.setInventory(inv);
    },

    getInventory() {
        let inv = this._get('inventory', []);
        if (inv.length === 0) {
            inv = [

            ];
            this._set('inventory', inv);
        }
        return inv;
    },
    setInventory(inv) { this._set('inventory', inv); },

    getCashBalance() { return this._get('cash_balance', { initial: 1500, current: 1500 }); },

            { ticket: 'TKT-00431', date: '28/05/2026', time: '11:45', cashier: 'Diego Mendoza', method: 'Tarjeta', status: 'Completada', subtotal: 2112.07, iva: 337.93, total: 2450.00, received: 2450.00, change: 0.00, items: [{ name: 'Paracetamol 500mg', quantity: 20, price: 45.00 }, { name: 'Detergente Líquido 1L', quantity: 5, price: 120.00 }, { name: 'Leche Entera 1L', quantity: 10, price: 28.00 }] },
            { ticket: 'TKT-00429', date: '27/05/2026', time: '18:05', cashier: 'María López', method: 'Efectivo', status: 'Cancelada', subtotal: 297.41, iva: 47.59, total: 345.00, received: 0, change: 0, items: [{ name: 'Pan Dulce Concha', quantity: 3, price: 12.00 }, { name: 'Jugo Del Valle 1L', quantity: 5, price: 25.00 }] },

        ];
        demo.forEach(s => {

        this.setSales(demo);

        const movs = [
            { id: 1, time: '09:00', type: 'Apertura', concept: 'Fondo inicial de caja', amount: 1500, balance: 1500 },

    getLastTicketId() {
        const sales = this.getSales();
        let max = 432;
        sales.forEach(s => {

            if (n > max) max = n;
        });
        return max;
    }
};

<script>
let branches = [
    { id: 1, name: 'Central', address: 'Av. Principal #123, Centro', active: true },
    { id: 2, name: 'Norte', address: 'Blvd. Norte #456, Industrial', active: true },
    { id: 3, name: 'Sur', address: 'Calle Sur #789, Residencial', active: false }
];
let nextBranchId = 4;

function renderBranches() {
    const container = document.getElementById('branchesContainer');
    container.innerHTML = branches.map(b => `
        <div class="border border-slate-100 rounded-2xl p-4 flex items-center justify-between shadow-xs hover:shadow-md transition-all animate-fade-in">
            <div class="space-y-1">
                <p class="font-bold text-slate-900 text-sm">${b.name}</p>
                <p class="text-xs text-slate-400">${b.address}</p>
            </div>
            <span onclick="toggleBranch(${b.id})" class="cursor-pointer inline-block px-3 py-1 rounded-full text-xs font-bold whitespace-nowrap ${b.active ? 'bg-emerald-50 text-emerald-700' : 'bg-slate-100 text-slate-500'}">${b.active ? 'Activa' : 'Inactiva'}</span>
        </div>
    `).join('');
    if (typeof lucide !== 'undefined') lucide.createIcons();
}

function toggleBranch(id) {
    const branch = branches.find(b => b.id === id);
    if (branch) { branch.active = !branch.active; renderBranches(); }
}

function agregarSucursal() {
    const name = prompt('Nombre de la nueva sucursal:');
    if (!name) return;
    branches.push({ id: nextBranchId++, name, address: 'Dirección pendiente', active: true });
    renderBranches();
}

function guardar() {
    const config = {
        businessName: document.getElementById('businessName').value,
        rfc: document.getElementById('rfc').value,
        iva: document.getElementById('iva').value,
        currency: document.getElementById('currency').value,
        branches: branches
    };
    localStorage.setItem('nexpos_config', JSON.stringify(config));
    alert('Configuración guardada exitosamente.');
}

function cancelar() {
    const saved = localStorage.getItem('nexpos_config');
    if (saved) {
        try {
            const cfg = JSON.parse(saved);
            document.getElementById('businessName').value = cfg.businessName || 'NexPoS Retail';
            document.getElementById('rfc').value = cfg.rfc || 'NEXR260101XXX';
            document.getElementById('iva').value = cfg.iva || '16%';
            document.getElementById('currency').value = cfg.currency || 'MXN';
            if (cfg.branches) { branches = cfg.branches; }
        } catch(e) {}
    } else {
        document.getElementById('businessName').value = 'NexPoS Retail';
        document.getElementById('rfc').value = 'NEXR260101XXX';
        document.getElementById('iva').value = '16%';
        document.getElementById('currency').value = 'MXN';
    }
    renderBranches();
}

function loadConfig() {
    const saved = localStorage.getItem('nexpos_config');
    if (saved) {
        try {
            const cfg = JSON.parse(saved);
            document.getElementById('businessName').value = cfg.businessName || 'NexPoS Retail';
            document.getElementById('rfc').value = cfg.rfc || 'NEXR260101XXX';
            document.getElementById('iva').value = cfg.iva || '16%';
            document.getElementById('currency').value = cfg.currency || 'MXN';
            if (cfg.branches) { branches = cfg.branches; }
        } catch(e) {}
    }
    renderBranches();
}

document.addEventListener('DOMContentLoaded', loadConfig);

</script>
