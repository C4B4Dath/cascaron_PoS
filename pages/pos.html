    _get(key, def) {
        try {
            const stored = localStorage.getItem('nexpos_' + key);
            if (!stored) return def;
            const data = JSON.parse(stored);
            // Check version for inventory
            if (key === 'inventory' && data.version !== DB_VERSION) {
                return def; // Force reload if version mismatch
            }
            return data.value ?? def;
        } catch { return def; }
    },
    _set(key, val, includeVersion = false) {
        const data = includeVersion ? { value: val, version: DB_VERSION } : val;
        localStorage.setItem('nexpos_' + key, JSON.stringify(data));
    },

    getSales() { return this._get('sales', []); },
    setSales(s) { this._set('sales', s); },

    addSale(sale) {
        const sales = this.getSales();
        sales.unshift(sale);
        this.setSales(sales);
        this._updateCashRegister(sale);
        this._updateInventory(sale);
        return sale;
    },

    _updateCashRegister(sale) {
        if (sale.method !== 'Efectivo') return;
        const movs = this._get('cash_movements', []);
        const balance = this.getCashBalance();
        movs.unshift({
            id: Date.now(), time: sale.time, type: 'Ingreso',
            concept: 'Venta ' + sale.ticket, amount: sale.total,
            balance: balance.current + sale.total
        });
        this._set('cash_movements', movs);
        this.setCashBalance({ ...balance, current: balance.current + sale.total });
    },

    _updateInventory(sale) {
        const inv = this.getInventory();
        sale.items.forEach(item => {
            const prod = inv.find(p => p.sku === item.sku);
            if (prod) prod.stock = Math.max(0, prod.stock - item.quantity);

        this.setInventory(inv);

                { id: 18, sku: 'SKU-00018', name: 'Pasta Dental Colgate 75ml', category: 'Cuidado Personal', stock: 14, price: 35.00, img: 'https://images.unsplash.com/photo-1620916566398-39f1143ab7be?w=400&h=400&fit=crop&auto=format&q=80' },
                { id: 19, sku: 'SKU-00019', name: 'Papel Higiénico 4 rollos', category: 'Abarrotes', stock: 9, price: 42.00, img: 'https://i5.walmartimages.com/asr/f9fd017f-8a55-49ce-b7fd-7cd4b1af1dac.a6e7698cd162d0c880134ee26951d878.jpeg?odnHeight=612&odnWidth=612&odnBg=FFFFFF' },

        }
        return inv;
    },
    setInventory(inv) { this._set('inventory', inv, true); },

    getCashBalance() { return this._get('cash_balance', { initial: 1500, current: 1500 }); },
    setCashBalance(b) { this._set('cash_balance', b); },
    getCashMovements() { return this._get('cash_movements', []); },
    setCashMovements(m) { this._set('cash_movements', m); },

    seedDemoData() {

        const demoSales = [
            { ticket: 'TKT-00430', date: '28/05/2026', time: '10:23', cashier: 'Diego Mendoza', method: 'Efectivo', status: 'Completada', subtotal: 1103.45, iva: 176.55, total: 1280.00, received: 1300.00, change: 20.00, items: [{ name: 'Paracetamol 500mg', sku: 'SKU-48291', quantity: 5, price: 45.00 }, { name: 'Coca-Cola 600ml', sku: 'SKU-10293', quantity: 12, price: 18.50 }] },

};

const PRODUCTS = DB.getInventory();
const CATEGORIES = ['Todos', 'Farmacia', 'Bebidas', 'Abarrotes', 'Cuidado Personal'];
let cart = [];
let currentCategory = 'Todos';
let searchQuery = '';
let amountReceived = '';
let paymentMethod = 'Efectivo';
let currentTicketId = '';
let cartCollapsed = false; // Track cart sidebar state

function init() {
    DB.seedDemoData();
    renderCategories();
    renderProducts();
    renderCart();
    renderCashPanel();
    setupMobileCartToggle();
    lucide.createIcons();
}

// === MOBILE CART TOGGLE SETUP ===
function setupMobileCartToggle() {
    const sidebar = document.getElementById('cartSidebar');
    const toggleBtn = sidebar.querySelector('.cart-toggle-btn');
    const floatingBtn = document.querySelector('.floating-cart-btn');

    // Show toggle buttons based on screen size
    function updateToggleVisibility() {
        if (window.innerWidth < 1024) {
            if (toggleBtn) toggleBtn.classList.add('hidden');
            if (floatingBtn) floatingBtn.classList.remove('hidden');
        } else {
            if (toggleBtn) toggleBtn.classList.remove('hidden');
            if (floatingBtn) floatingBtn.classList.add('hidden');
        }
    }

    window.addEventListener('resize', updateToggleVisibility);
    updateToggleVisibility();
}

function toggleCartSidebar() {
    const sidebar = document.getElementById('cartSidebar');
    const toggleBtn = sidebar.querySelector('.cart-toggle-btn');
    const floatingBtn = document.querySelector('.floating-cart-btn');

    cartCollapsed = !cartCollapsed;

    if (cartCollapsed) {
        sidebar.classList.add('collapsed');
        if (toggleBtn) toggleBtn.classList.add('collapsed');
        if (floatingBtn) floatingBtn.classList.add('collapsed');
    } else {
        sidebar.classList.remove('collapsed');
        if (toggleBtn) toggleBtn.classList.remove('collapsed');
        if (floatingBtn) floatingBtn.classList.remove('collapsed');
    }

    // Update floating button badge visibility
    updateFloatingCartBadge();
}

function updateFloatingCartBadge() {
    const badge = document.getElementById('floatingCartCount');
    const count = cart.reduce((sum, i) => sum + i.quantity, 0);
    if (badge) {
        badge.innerText = count;
        badge.style.display = count > 0 ? 'flex' : 'none';
    }
}

function renderCategories() {
    const container = document.getElementById('categoryContainer');
    container.innerHTML = CATEGORIES.map(cat => `
        <button onclick="setCategory('${cat}')" class="text-sm font-bold tracking-wide pb-2 transition-all border-b-2 whitespace-nowrap ${currentCategory === cat ? 'border-slate-900 text-slate-900 font-black' : 'border-transparent text-slate-400 hover:text-slate-600'}">
            ${cat}
        </button>
    `).join('');
}

function setCategory(cat) {
    currentCategory = cat;
    renderCategories();
    renderProducts();
}

function handleSearch(val) {
    searchQuery = val;
    renderProducts();
}

function renderProducts() {
    const grid = document.getElementById('productGrid');
    const filtered = PRODUCTS.filter(p => {
        const matchCat = currentCategory === 'Todos' || p.category === currentCategory;
        const matchSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase());
        return matchCat && matchSearch && p.stock > 0;
    });

    if (filtered.length === 0) {
        grid.innerHTML = `
            <div class="col-span-full flex flex-col items-center justify-center py-20 text-center">
                <span class="text-5xl text-slate-200 mb-4">🔍</span>
                <p class="text-lg font-bold text-slate-300">Sin resultados</p>
                <p class="text-sm text-slate-300 mt-1">Intenta con otros términos o categoría</p>
                <button onclick="forceReloadProducts()" class="mt-4 text-xs text-blue-600 hover:text-blue-800 font-bold flex items-center gap-1">
                    <i data-lucide="refresh-cw" class="w-3 h-3"></i> Forzar recarga de productos
                </button>
            </div>
        `;
        return;
    }

    grid.innerHTML = filtered.map(p => {
        const stockClass = p.stock <= 2 ? 'critical' : p.stock <= 5 ? 'low' : 'ok';
        const stockText = p.stock <= 2 ? '¡Últimas!' : p.stock <= 5 ? 'Pocas' : `${p.stock} pzas`;
        // Add cache-busting param to image URL
        const imgSrc = p.img + (p.img.includes('?') ? '&' : '?') + 'v=' + DB_VERSION;

        return `
        <div onclick="${p.stock > 0 ? `addToCart(${p.id})` : ''}"
            class="product-card bg-white rounded-2xl border border-slate-100 p-6 flex flex-col justify-between relative cursor-pointer group shadow-md hover:shadow-xl hover:border-slate-300 transition-all duration-200 ${p.stock <= 2 ? 'ring-2 ring-rose-200' : ''}">

            <span class="stock-badge ${stockClass}">${stockText}</span>
            <span class="absolute top-6 right-6 text-base font-black text-slate-900 bg-white/90 backdrop-blur-xs px-3 py-1 rounded-lg border border-slate-100 shadow-xs">$${p.price.toFixed(2)}</span>

            <div class="w-full aspect-square bg-slate-50 rounded-xl overflow-hidden flex items-center justify-center p-2 mb-6">
                <img src="${imgSrc}" alt="${p.name}" loading="lazy" class="product-img w-full h-full object-cover rounded-lg" onerror="this.src='https://via.placeholder.com/400x400?text=Sin+Imagen'">
            </div>

            <div class="text-center space-y-1">
                <p class="text-xs text-slate-400 uppercase tracking-widest font-black">${p.category}</p>
                <h3 class="font-bold text-slate-800 text-sm tracking-tight leading-snug truncate">${p.name}</h3>
                ${p.stock <= 2 ? `<p class="text-[10px] text-rose-600 font-bold uppercase tracking-wider">⚠️ Stock crítico</p>` : ''}
            </div>
        </div>
    `}).join('');
}

function renderCart() {

        document.getElementById('txtIva').innerText = '$0.00';

                    <h4 class="font-bold text-slate-900 text-sm leading-tight pr-6 truncate">${item.name}</h4>
                    <button onclick="removeFromCart(${item.id})" class="absolute top-3 right-3 text-slate-300 hover:text-rose-500 text-sm transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <p class="text-xs font-semibold text-slate-400 mt-0.5">$${item.price.toFixed(2)} c/u</p>
                <div class="flex items-center justify-between mt-3">
                    <div class="flex items-center space-x-1 bg-white border border-slate-200 rounded-xl p-0.5 shadow-xs">
                        <button onclick="updateQuantity(${item.id}, -1)" class="w-8 h-8 flex items-center justify-center text-slate-600 hover:text-slate-900 hover:bg-slate-100 font-black text-lg transition-all rounded-lg active:scale-90">−</button>
                        <span class="font-mono text-slate-900 font-black text-sm w-7 text-center">${item.quantity}</span>
                        <button onclick="updateQuantity(${item.id}, 1)" class="w-8 h-8 flex items-center justify-center text-slate-600 hover:text-slate-900 hover:bg-slate-100 font-black text-lg transition-all rounded-lg active:scale-90">+</button>
                    </div>
                    <span class="font-black text-slate-900 text-base tracking-tight">$${(item.price * item.quantity).toFixed(2)}</span>
                </div>
                ${stockLeft <= 3 ? `<p class="text-[10px] text-amber-600 font-bold mt-1">⚠️ Solo quedan ${stockLeft} en inventario</p>` : ''}
            </div>
        </div>
    `}).join('');

    const subtotal = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
    const iva = subtotal * 0.16;
    const total = subtotal + iva;

    document.getElementById('txtSubtotal').innerText = `$${subtotal.toFixed(2)}`;
    document.getElementById('txtIva').innerText = `$${iva.toFixed(2)}`;
    document.getElementById('txtTotal').innerText = `$${total.toFixed(2)}`;
    document.getElementById('btnCheckout').disabled = false;

    lucide.createIcons();
}

function addToCart(id) {
    const product = PRODUCTS.find(p => p.id === id);
    if (!product || product.stock <= 0) {
        showToast('Producto agotado', 'error');
        return;
    }

    const existing = cart.find(item => item.id === id);
    if (existing) {
        if (existing.quantity >= product.stock) {
            showToast('Stock máximo alcanzado', 'error');
            return;
        }
        existing.quantity += 1;
    } else {
        cart.push({ ...product, quantity: 1 });
    }

    renderCart();
    renderProducts();
    showToast(`${product.name} agregado`, 'success');
}

function updateQuantity(id, delta) {
    const item = cart.find(item => item.id === id);
    const product = PRODUCTS.find(p => p.id === id);
    if (item && product) {
        const newQty = item.quantity + delta;
        if (newQty <= 0) {
            cart = cart.filter(i => i.id !== id);
        } else if (newQty <= product.stock) {
            item.quantity = newQty;
        } else {
            showToast('No hay suficiente stock', 'error');
            return;
        }
    }
    renderCart();
    renderProducts();
}

function removeFromCart(id) {
    cart = cart.filter(i => i.id !== id);
    renderCart();
    renderProducts();
}

function clearCart() {
    if (cart.length === 0) return;
    cart = [];
    renderCart();
    renderProducts();
    showToast('Carrito vaciado', 'success');
}

function getTotals() {
    const subtotal = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
    const iva = subtotal * 0.16;
    const total = subtotal + iva;
    const received = parseFloat(amountReceived) || 0;
    const change = received >= total ? received - total : 0;
    return { subtotal, iva, total, change, received };
}

function openCheckout() {
    if (cart.length === 0) return;
    amountReceived = '';
    paymentMethod = 'Efectivo';
    document.getElementById('checkoutModal').classList.remove('hidden');
    renderCheckoutForm();
}

function closeCheckout() {
    document.getElementById('checkoutModal').classList.add('hidden');
}

function renderCheckoutForm() {
    const { total, change, received } = getTotals();
    const content = document.getElementById('checkoutContent');
    const canPay = paymentMethod === 'Efectivo' ? (received >= total && received > 0) : true;

    content.innerHTML = `
        <div class="space-y-6">
            <div>
                <label class="text-xs text-slate-400 font-black uppercase tracking-wider block mb-2">Método de Pago</label>
                <div class="payment-methods">
                    <div class="payment-method ${paymentMethod === 'Efectivo' ? 'active' : ''}" onclick="setPaymentMethod('Efectivo')">
                        <i data-lucide="banknote" class="w-5 h-5 mx-auto"></i>
                        Efectivo
                    </div>
                    <div class="payment-method ${paymentMethod === 'Tarjeta' ? 'active' : ''}" onclick="setPaymentMethod('Tarjeta')">
                        <i data-lucide="credit-card" class="w-5 h-5 mx-auto"></i>
                        Tarjeta
                    </div>
                    <div class="payment-method ${paymentMethod === 'Mixto' ? 'active' : ''}" onclick="setPaymentMethod('Mixto')">
                        <i data-lucide="layers" class="w-5 h-5 mx-auto"></i>
                        Mixto
                    </div>
                </div>
            </div>

            <div class="text-center py-4 border-b border-slate-100">
                <span class="text-xs text-slate-400 uppercase tracking-widest block mb-1 font-black">Monto de la Venta</span>
                <span class="text-4xl font-black text-slate-900 tracking-tight">$${total.toFixed(2)}</span>
            </div>

            ${paymentMethod !== 'Tarjeta' ? `
            <div>
                <label class="text-xs text-slate-400 font-black uppercase tracking-wider block mb-2">Efectivo Entregado</label>
                <input type="text" readonly id="receivedInput" placeholder="$0.00"
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl py-4 px-4 font-mono text-2xl text-right font-black text-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-400 received-display"
                    value="${amountReceived ? '$' + parseFloat(amountReceived).toFixed(2) : ''}">
            </div>
            <div class="flex justify-between items-center py-3 px-1 bg-emerald-50 rounded-xl ${change > 0 ? '' : 'opacity-40'}">
                <span class="text-slate-400 uppercase tracking-wider text-xs font-black flex items-center gap-1">
                    <i data-lucide="arrow-left-right" class="w-3 h-3"></i> Cambio a devolver
                </span>
                <span class="font-mono font-black text-xl ${change > 0 ? 'text-emerald-600' : 'text-slate-400'}">$${change.toFixed(2)}</span>
            </div>
            ` : `
            <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 text-center">
                <i data-lucide="credit-card" class="w-8 h-8 text-blue-600 mx-auto mb-2"></i>
                <p class="text-sm font-bold text-slate-700">Pago con tarjeta</p>
                <p class="text-xs text-slate-400 mt-1">Conecta el terminal para procesar</p>
            </div>
            `}
        </div>

        <div class="space-y-3">
            ${paymentMethod === 'Efectivo' ? `
            <div class="grid grid-cols-4 gap-2">
                ${[50, 100, 200, 500].map(bill => `
                    <button onclick="quickCash(${bill})" class="quick-cash-btn bg-slate-50 border border-slate-200 hover:bg-slate-100 py-3 rounded-xl font-mono text-xs font-bold text-slate-700 transition-all active:scale-95">$${bill}</button>
                `).join('')}
            </div>
            <div class="grid grid-cols-3 gap-2">
                ${['1', '2', '3', '4', '5', '6', '7', '8', '9', '.', '0', '⌫'].map(k => `
                    <button onclick="pressKey('${k}')" class="keypad-btn bg-white hover:bg-slate-50 py-4 rounded-xl text-slate-800 border border-slate-200 font-black text-base active:scale-95 transition-all">${k === '⌫' ? '⌫' : k}</button>
                `).join('')}
            </div>
            ` : ''}

            <button id="btnProcessPayment" ${canPay ? '' : 'disabled'} onclick="processPayment()"
                class="w-full bg-slate-900 hover:bg-slate-800 disabled:bg-slate-100 disabled:text-slate-300 text-white font-black py-4 rounded-xl text-center text-sm tracking-wider uppercase transition-all active:scale-98 flex items-center justify-center gap-2">
                <i data-lucide="check-circle" class="w-4 h-4"></i>
                Pagar $${total.toFixed(2)}
            </button>
            <button onclick="cancelCheckout()" class="w-full border border-slate-200 hover:bg-slate-50 text-slate-500 font-bold py-3 rounded-xl text-xs uppercase tracking-wider transition-all">
                Cancelar Venta
            </button>
        </div>
    `;
    lucide.createIcons();
}

function setPaymentMethod(method) {
    paymentMethod = method;
    if (method !== 'Efectivo') amountReceived = '';
    renderCheckoutForm();
}

function pressKey(key) {
    if (key === '⌫') {
        amountReceived = amountReceived.slice(0, -1);
    } else if (key === '.' && !amountReceived.includes('.')) {
        amountReceived += '.';
    } else if (!isNaN(key)) {
        amountReceived += key;
    }
    renderCheckoutForm();
}

function quickCash(amount) {
    const curr = parseFloat(amountReceived) || 0;
    amountReceived = (curr + amount).toFixed(2);
    renderCheckoutForm();
}

function processPayment() {
    const { subtotal, iva, total, change, received } = getTotals();
    if (paymentMethod === 'Efectivo' && received < total) return;

    const ticketId = 'TKT-' + String(Math.floor(Math.random() * 90000) + 10000);
    const now = new Date();
    const dateStr = now.toLocaleDateString('es-MX', { day: '2-digit', month: '2-digit', year: 'numeric' });
    const timeStr = now.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });

    const sale = {
        ticket: ticketId, date: dateStr, time: timeStr,
        cashier: 'Diego Mendoza', method: paymentMethod, status: 'Completada',
        subtotal, iva, total, received: paymentMethod === 'Efectivo' ? received : total, change,
        items: cart.map(i => ({ name: i.name, sku: i.sku, quantity: i.quantity, price: i.price }))
    };

    DB.addSale(sale);
    currentTicketId = ticketId;

    const content = document.getElementById('checkoutContent');
    content.innerHTML = `
        <div class="flex-1 flex flex-col items-center justify-center text-center space-y-6">
            <div class="w-20 h-20 bg-emerald-500 rounded-full flex items-center justify-center animate-pulse-soft shadow-lg">
                <svg class="w-10 h-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path class="checkmark-path" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <div>
                <h3 class="text-2xl font-black text-slate-900 tracking-tight">Pago Exitoso</h3>
                <p class="text-sm text-slate-400 mt-1 font-medium">Transacción #${ticketId} completada</p>
            </div>
        </div>
    `;
    setTimeout(() => renderTicket(), 1200);
}

function cancelCheckout() {
    if (confirm('¿Estás seguro de cancelar esta venta? Se perderán todos los artículos del carrito.')) {
        closeCheckout();
        cart = [];
        renderCart();
        renderProducts();
        showToast('Venta cancelada', 'error');
    }
}

function renderTicket() {
    const content = document.getElementById('checkoutContent');
    const { subtotal, iva, total, change, received } = getTotals();
    const ticketId = currentTicketId || 'TKT-' + String(Math.floor(Math.random() * 90000) + 10000);
    const now = new Date();
    const dateStr = now.toLocaleDateString('es-MX', { day: '2-digit', month: '2-digit', year: 'numeric' });
    const timeStr = now.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

    content.innerHTML = `
        <div class="flex-1 flex flex-col items-center space-y-6 overflow-y-auto p-2 ticket-appear">
            <div class="bg-white border border-slate-200 p-6 w-full text-slate-800 font-mono text-xs space-y-2 rounded-xl shadow-xs">
                <div class="text-center">
                    <p class="text-base font-black tracking-tight text-slate-900">NexPoS</p>
                    <p class="text-[10px] text-slate-400 font-bold">Sistema de Punto de Venta</p>
                </div>
                <hr class="border-dashed border-slate-200">
                <div class="text-slate-500 font-semibold space-y-0.5">
                    <p>Ticket: ${ticketId}</p>
                    <p>Fecha: ${dateStr} ${timeStr}</p>
                    <p>Turno: Matutino</p>
                    <p>Atendió: Diego Mendoza</p>
                    <p>Método: ${paymentMethod}</p>
                </div>
                <hr class="border-dashed border-slate-200">
                <div class="space-y-1">
                    ${cart.map(i => `
                        <div class="flex justify-between">
                            <span class="truncate max-w-[160px]">${i.quantity}x ${i.name}</span>
                            <span class="font-bold">$${(i.price * i.quantity).toFixed(2)}</span>
                        </div>
                    `).join('')}
                </div>
                <hr class="border-dashed border-slate-200">
                <div class="text-right space-y-1 font-bold">
                    <div class="flex justify-between text-slate-500">
                        <span>Subtotal</span><span>$${subtotal.toFixed(2)}</span>
                    </div>
                    <div class="flex justify-between text-slate-500">
                        <span>IVA 16%</span><span>$${iva.toFixed(2)}</span>
                    </div>
                    <div class="flex justify-between text-base text-slate-900 pt-1 border-t border-slate-100">
                        <span>TOTAL</span><span>$${total.toFixed(2)}</span>
                    </div>
                    ${paymentMethod === 'Efectivo' ? `
                    <div class="flex justify-between text-slate-400 font-normal text-[10px]">
                        <span>Efectivo recibido</span><span>$${received.toFixed(2)}</span>
                    </div>
                    <div class="flex justify-between text-emerald-600 font-normal text-[10px]">
                        <span>Cambio devuelto</span><span>$${change.toFixed(2)}</span>
                    </div>` : ''}
                </div>
            </div>

            <div class="w-full space-y-2">
                <button onclick="reprintTicket()" class="w-full border border-slate-200 hover:bg-slate-50 text-slate-700 font-bold py-3 rounded-xl text-xs uppercase tracking-wider transition-all flex items-center justify-center gap-2">
                    <i data-lucide="printer" class="w-4 h-4"></i> Reimprimir Ticket
                </button>
                <button onclick="goToBilling()" class="w-full bg-blue-50 hover:bg-blue-100 text-blue-600 font-bold py-3 rounded-xl text-xs uppercase tracking-wider transition-all flex items-center justify-center gap-2">
                    <i data-lucide="file-text" class="w-4 h-4"></i> Facturar (CFDI)
                </button>
                <button onclick="resetAll()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-xl text-sm uppercase tracking-wider transition-all shadow-md active:scale-98 flex items-center justify-center gap-2">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i> Nueva Venta
                </button>
            </div>
            <p class="text-[10px] text-slate-300 text-center">Gracias por su compra • NexPoS Retail</p>
        </div>
    `;
    lucide.createIcons();
}

function reprintTicket() {
    showToast('Ticket listo para imprimir', 'success');
}

function goToBilling() {
    showToast('Redirigiendo a facturación...', 'success');
}

function resetAll() {
    cart = [];
    amountReceived = '';
    currentTicketId = '';
    closeCheckout();
    renderCart();
    renderProducts();
    renderCashPanel();
    showToast('Nueva venta iniciada', 'success');
}

function renderCashPanel() {
    const balance = DB.getCashBalance();
    const movs = DB.getCashMovements().slice(0, 3);

    document.getElementById('cashBalance').innerText = `$${balance.current.toFixed(2)}`;

    const recentEl = document.getElementById('recentSales');
    if (movs.length === 0) {
        recentEl.innerHTML = `<p class="text-[10px] text-slate-400 italic">Sin movimientos recientes</p>`;
        return;
    }

    recentEl.innerHTML = movs.map(m => `
        <div class="recent-item">
            <span class="ticket">${m.concept}</span>
            <span class="amount ${m.amount >= 0 ? 'text-emerald-600' : 'text-rose-600'}">
                ${m.amount >= 0 ? '+' : ''}$${Math.abs(m.amount).toFixed(2)}
            </span>
        </div>
    `).join('');
}

// === NEW: Force Reload Products Function ===
function forceReloadProducts() {
    if (confirm('¿Forzar recarga de productos?\n\nEsto limpiará los datos guardados y los volverá a cargar desde el servidor de demostración.')) {
        DB.forceReloadProducts();
    }
}

function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `
        <i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" class="icon ${type === 'success' ? 'text-emerald-600' : 'text-rose-600'}"></i>
        <span class="message">${message}</span>
    `;
    container.appendChild(toast);
    lucide.createIcons();

    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(20px)';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

window.onload = init;
    </script>
</body>
</html>
