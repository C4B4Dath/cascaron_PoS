// === DATABASE ===
const DB_VERSION = '1.0';
const DB = {
    _get(key, def) {
        try {
            const stored = localStorage.getItem('nexpos_' + key);
            if (!stored) return def;
            const data = JSON.parse(stored);
            if (data.version !== DB_VERSION) return def;
            return data.value ?? def;
        } catch { return def; }
    },
    _set(key, val) {
        localStorage.setItem('nexpos_' + key, JSON.stringify({ value: val, version: DB_VERSION }));
    },

    getSales() { return this._get('sales', []); },
    setSales(s) { this._set('sales', s); },

    seedDemoData() {
        if (this.getSales().length === 0) {
            this.setSales([
                { ticket: 'TKT-00432', date: '28/05/2026', time: '14:30', cashier: 'Diego Mendoza', method: 'Efectivo', status: 'Completada', subtotal: 162.10, iva: 25.94, total: 188.04, received: 200.00, change: 11.96, items: [] },

let currentFilters = { search: '', status: '', method: '', date: '' };
let currentPage = 1;
const itemsPerPage = 10;

function init() {
    // Esperar un poco para asegurar que los datos estén listos
    setTimeout(() => {
        DB.seedDemoData();
        renderSales();
        lucide.createIcons();
    }, 100);
}

function formatCurrency(amount) {
    return new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(amount);
}

function renderSales() {
    const sales = DB.getSales();
    const tbody = document.getElementById('tablaVentas');
    const emptyState = document.getElementById('emptyState');

    // Apply filters
    let filtered = sales.filter(s => {
        const matchSearch = !currentFilters.search ||
            s.ticket.toLowerCase().includes(currentFilters.search.toLowerCase()) ||
            s.cashier.toLowerCase().includes(currentFilters.search.toLowerCase());
        const matchStatus = !currentFilters.status || s.status === currentFilters.status;
        const matchMethod = !currentFilters.method || s.method === currentFilters.method;
        const matchDate = !currentFilters.date || s.date === currentFilters.date;
        return matchSearch && matchStatus && matchMethod && matchDate;
    });

    // Sort by date/time descending (newest first)
    filtered.sort((a, b) => {
        const dateA = new Date(a.date.split('/').reverse().join('-') + 'T' + a.time);
        const dateB = new Date(b.date.split('/').reverse().join('-') + 'T' + b.time);
        return dateB - dateA;
    });

    // Update results count
    document.getElementById('resultsCount').innerText = `Mostrando ${filtered.length} de ${sales.length} resultados`;

    // Show/hide empty state
    if (filtered.length === 0) {
        tbody.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
    }
    emptyState.classList.add('hidden');

    // Render rows
    tbody.innerHTML = filtered.map(s => {
        const ticketNum = s.ticket.replace('TKT-', '');
        const methodClass = s.method === 'Efectivo' ? 'efectivo' : s.method === 'Tarjeta' ? 'tarjeta' : 'split';
        const statusClass = s.status === 'Completada' ? 'completada' : s.status === 'Cancelada' ? 'cancelada' : 'pendiente';
        const methodIcon = s.method === 'Efectivo' ? 'banknote' : s.method === 'Tarjeta' ? 'credit-card' : 'layers';

        return `
        <tr class="sale-row" onclick="window.location.href='sale-detail.html?ticket=${s.ticket}'">
            <td class="p-4 pl-6">#${ticketNum}</td>
            <td class="p-4 text-slate-600">${s.date} <span class="text-slate-400">${s.time}</span></td>
            <td class="p-4 font-bold text-slate-900">${s.cashier}</td>
            <td class="p-4">
                <span class="method-badge ${methodClass}">
                    <i data-lucide="${methodIcon}" class="w-3 h-3"></i>
                    ${s.method}
                </span>
            </td>
            <td class="p-4 text-right font-mono font-bold text-slate-900">${formatCurrency(s.total)}</td>
            <td class="p-4 text-center pr-6">
                <span class="status-badge ${statusClass}">${s.status}</span>
            </td>
        </tr>`;
    }).join('');

    // Render pagination (simplified for demo)
    renderPagination(filtered.length);

    lucide.createIcons();
}

function renderPagination(totalItems) {
    const pagination = document.getElementById('pagination');
    const totalPages = Math.ceil(totalItems / itemsPerPage);

    if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
    }

    let html = `
        <button class="pagination-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">
            <i data-lucide="chevron-left" class="w-4 h-4"></i>
        </button>
    `;

    // Show up to 5 page numbers
    const startPage = Math.max(1, currentPage - 2);
    const endPage = Math.min(totalPages, startPage + 4);

    for (let i = startPage; i <= endPage; i++) {
        html += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
    }

    html += `
        <button class="pagination-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">
            <i data-lucide="chevron-right" class="w-4 h-4"></i>
        </button>
    `;

    pagination.innerHTML = html;
    lucide.createIcons();
}

function changePage(page) {
    currentPage = page;
    renderSales();
}

function applyFilters() {
    currentFilters.search = document.getElementById('searchInput').value;
    currentFilters.status = document.getElementById('filterStatus').value;
    currentFilters.method = document.getElementById('filterMethod').value;
    currentFilters.date = document.getElementById('filterDate').value;
    currentPage = 1;
    renderSales();
}

function resetFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('filterStatus').value = '';
    document.getElementById('filterMethod').value = '';
    document.getElementById('filterDate').value = '';
    currentFilters = { search: '', status: '', method: '', date: '' };
    currentPage = 1;
    renderSales();
    showToast('Filtros restablecidos', 'success');
}

// Event Listeners
document.getElementById('btnFiltrar').addEventListener('click', applyFilters);
document.getElementById('searchInput').addEventListener('keyup', (e) => {
    if (e.key === 'Enter') applyFilters();
});

// Toast Notifications
function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<i data-lucide="${type === 'success' ? 'circle-check' : 'circle-alert'}" class="icon ${type === 'success' ? 'text-emerald-600' : 'text-rose-600'}"></i><span class="message">${message}</span>`;
    container.appendChild(toast);
    lucide.createIcons();
    setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(20px)'; setTimeout(() => toast.remove(), 300); }, 3000);
}

window.onload = init;
